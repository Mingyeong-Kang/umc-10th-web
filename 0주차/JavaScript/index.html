<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./app.js" defer></script>
    <title>UMC Study Plan</title>
</head>
<body>
    <div class="todo-container">
        <h1 class="todo-container__header">UMC Study Plan</h1>
        <form id="todo-form" class="todo-container__form">
            <input
            type="text"
            id="todo-input"
            class="todo-container__input"
            placeholder="스터디 계획을 작성해보세요!"
            required
            >
            <!-- enter 입력시 자동으로 submit -->
        </form>
        <div class="render-container">
            <div class="render-container__section">
                <h2 class="render-container__title">해야 할 일</h2>
                <ul id="todo-list" class="render-container__list">
                    <!-- <li class="render-container__item">
                        <p class="render-container_item-text">123</p>
                        <button class="render-container__item-button">완료</button>
                    </li> -->
                </ul>
            </div>
            <div class="render-container__section">
                <h2 class="render-container__title">해낸 일</h2>
                <ul id="done-list" class="render-container__list"></ul>
            </div>
        </div>
    </div>
</body>
</html>

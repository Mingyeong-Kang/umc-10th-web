<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS 파일 업로드 -->
    <link rel="stylesheet" href="./style.css"/>

    <!-- JS 파일 업로드 -->
    <!-- defer는 JS 파일을 문서 앞에 쓰되 읽는건 문서를 전부 읽은 뒤에 읽으라는 뜻 -->
    <script type="module" src="./dist/script.js" defer></script> 

    <title>UMC TODO</title>
</head>
<body>
    <div class="todo-container">
        <h1 class="todo-container__header">YEONI TODO</h1>
        <form id="todo-form" class="todo-container__form" >
            <input 
            type="text" 
            id="todo-input" 
            class="todo-container__input"
            placeholder="할 일을 입력해주세요."
            required
            /> <!-- required는 무조건 값이 들어가야함을 의미함 -->
            <button type="submit" class="todo-container__button">할일 추가</button>
            <!--폼 태그에서 버튼이 눌렸을 때 액션이 있다면 반드시 타입을 submit이라 해야함 -->
        </form>
        <div class="render-container">
            <div class="render-container__section">
                <h2 class="render-container__title">할 일</h2>
                <ul id="todo-list" class="render-container__list">
                    <!-- <li class="render-container__item">
                        <p class="render-container__item_text">123</p>
                        <button class="render-container__item-button">삭제</button>
                    </li> -->
                </ul>
            </div>
            <div class="render-container__section">
                <h2 class="render-container__title">완료</h2>
                <ul id="done-list" class="render-container__list"></ul>
            </div>
        </div>
    </div>
</body>
</html>
